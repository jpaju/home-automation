version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 0 1-7 */2 6"
      timezone: "Europe/Helsinki"
    commit-message:
      prefix: "update"
    assignees:
      - jpaju
    groups:
      nix-flake-inputs:
        patterns:
          - "*"
